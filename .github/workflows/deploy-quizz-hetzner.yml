name: Deploy Quizz app to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (optional, mostly for info)
        uses: actions/checkout@v4

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy on Hetzner
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} << 'EOF'
            set -e

            echo "Changing to project directory"
            cd /var/www/quizz-app/Quizz

            echo "Fetching latest code"
            git fetch origin
            git reset --hard origin/main

            echo "Stopping existing containers"
            docker compose down || true

            echo "Building and restarting in detached mode"
            docker compose up -d --build

            echo "Pruning old images (optional)"
            docker image prune -f || true

            echo "Deployment completed"
          EOF
